name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Forçar Localização dos Arquivos
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 1. Tenta descobrir onde está o seu index.html real
          # Se estiver dentro de uma pasta, ele vai achar e trazer para a frente
          REAL_PATH=$(find . -name "index.html" -not -path "./android/*" -not -path "./node_modules/*" | head -n 1 | xargs dirname)
          echo "Arquivos encontrados em: $REAL_PATH"

          # 2. Cria a pasta do app e copia TUDO dessa localização
          mkdir -p public_html
          cp -r $REAL_PATH/* public_html/ || true
          
          # 3. Garante que o ícone exista para o build não quebrar
          touch public_html/favicon.ico 

          # 4. Configura o Capacitor
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "public_html",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 5. Sincroniza (Removendo a pasta android antiga se houver erro)
          npx cap add android || rm -rf android && npx cap add android
          npx cap sync android

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: app-lumen-v3
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
