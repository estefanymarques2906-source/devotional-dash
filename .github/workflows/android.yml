name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Achar arquivos e Montar App
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 1. Cria a pasta que o Capacitor exige
          rm -rf dist android
          mkdir -p dist/client

          # 2. BUSCA REAL: Encontra o index.html e o favicon onde quer que estejam
          # e copia tudo o que estiver na mesma pasta deles (os 100MB)
          INDEX_PATH=$(find . -name "index.html" -not -path "*/node_modules/*" | head -n 1)
          FAVICON_PATH=$(find . -name "favicon.ico" -not -path "*/node_modules/*" | head -n 1)
          
          if [ -z "$INDEX_PATH" ]; then
            echo "ERRO: index.html não encontrado no GitHub!"
            exit 1
          fi

          # Copia a pasta inteira onde o index.html foi achado
          cp -r $(dirname "$INDEX_PATH")/* dist/client/
          
          # Se o favicon estiver em outro lugar, busca ele também
          [ -f "$FAVICON_PATH" ] && cp "$FAVICON_PATH" dist/client/favicon.ico || true

          # 3. Configura o Capacitor
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 4. Gera o Android
          npx cap add android
          npx cap sync android

          # 5. Gera os ícones para o celular
          if [ -f "dist/client/favicon.ico" ]; then
            cp dist/client/favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: app-lumen-resolvido
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
