name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Montar App Sem Erro de Loop
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 1. Limpa tudo antes de começar
          rm -rf android dist tmp_build
          mkdir -p tmp_build

          # 2. Localiza o index.html e o favicon.ico
          INDEX_FILE=$(find . -name "index.html" -not -path "*/node_modules/*" -not -path "*/android/*" | head -n 1)
          FAVICON_FILE=$(find . -name "favicon.ico" -not -path "*/node_modules/*" -not -path "*/android/*" | head -n 1)

          if [ -z "$INDEX_FILE" ]; then
            echo "ERRO: index.html não encontrado no GitHub!"
            exit 1
          fi

          # 3. Copia o CONTEÚDO da pasta onde o index está para a pasta temporária
          # Usamos o caminho absoluto para evitar o erro de 'copy into itself'
          SOURCE_DIR=$(dirname $(realpath "$INDEX_FILE"))
          cp -r "$SOURCE_DIR"/* tmp_build/

          # 4. Garante que o favicon esteja lá (mesmo se estiver em outra pasta)
          if [ ! -z "$FAVICON_FILE" ]; then
            cp "$(realpath "$FAVICON_FILE")" tmp_build/favicon.ico
          fi

          # 5. Configura o Capacitor apontando para a pasta temporária
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "tmp_build",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 6. Gera o Android
          npx cap add android
          npx cap sync android

          # 7. Gera os ícones a partir do favicon que achamos
          if [ -f "tmp_build/favicon.ico" ]; then
            cp tmp_build/favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: app-lumen-vfinal
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
