name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do meu GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 17 (Coração do Android)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar e Preparar
        run: |
          npm install
          mkdir -p www
          cp -r . www/ 2>/dev/null || true
          rm -rf android capacitor.config.json capacitor.config.ts
          
      - name: Inicializar Capacitor
        run: |
          npx cap init BibliaApp com.biblia.app --web-dir www
          npx cap add android

      - name: FORÇAR JAVA 17 NO GRADLE
        run: |
          cd android
          # Força o Gradle a usar o Java 17 que instalamos
          echo "org.gradle.java.home=${JAVA_HOME}" >> gradle.properties
          
          # Ajusta o nível de compilação para Java 17 nos arquivos internos
          sed -i 's/JavaVersion.VERSION_1_8/JavaVersion.VERSION_17/g' app/build.gradle
          sed -i 's/JavaVersion.VERSION_11/JavaVersion.VERSION_17/g' app/build.gradle
          
          chmod +x gradlew

      - name: Sincronizar e Build Final
        run: |
          npx cap sync android
          cd android
          # Limpa tudo e compila
          ./gradlew clean assembleDebug --stacktrace

      - name: Me entregar o APK pronto
        uses: actions/upload-artifact@v4
        with:
          name: aplicativo-final
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
