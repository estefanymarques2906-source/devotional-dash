name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 21 e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependencias
        run: |
          npm install
          sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Preparar App e Icone
        run: |
          # 1. Garante que a pasta www não esteja vazia (causa principal do crash)
          mkdir -p www
          if [ -z "$(ls -A www)" ]; then
            echo "<html><body>Lumen Biblia Carregando...</body></html>" > www/index.html
          fi

          # 2. Gera o capacitor.config.json com aspas protegidas e HTTPS
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia Devocional",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

          # 3. Sincroniza e gera ícones
          npx cap sync android
          if [ -f "icon.png" ]; then
            npm install @capacitor/assets
            npx @capacitor/assets generate --android --icon icon.png || true
          fi

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-biblia-final
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
