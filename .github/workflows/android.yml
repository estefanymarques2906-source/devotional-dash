name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 21 e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preparar App e Icone
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          npm install
          npm install @capacitor/assets

          # Criando a pasta que o seu erro pediu
          mkdir -p dist/client
          
          # Se os seus arquivos estiverem na raiz, copia para lá
          cp -r . dist/client/ || true

          # CONFIGURAÇÃO FORÇANDO A PASTA QUE DEU ERRO
          rm -rf android/capacitor.config.*
          echo '{"appId":"com.lumen.biblia","appName":"Lumen Biblia Devocional","webDir":"dist/client","server":{"androidScheme":"https","allowNavigation":["*"],"cleartext":true}}' > capacitor.config.json

          npx cap add android || true

          if [ -f "icon.png" ]; then
            npx @capacitor/assets generate --android --icon icon.png || true
          fi

      - name: Gerar APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-biblia-final
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
