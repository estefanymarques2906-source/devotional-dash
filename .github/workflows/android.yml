name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Instalar Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Instalar Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Criar projeto Android
        run: |
          npx cap init app.biblia "Biblia App" --web-dir=dist
          npx cap add android

      - name: Copiar build
        run: npx cap copy

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
