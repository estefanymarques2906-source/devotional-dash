name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 21 e Node
        uses: actions/setup-java@v4
        with: {java-version: '21', distribution: 'zulu'}
      - uses: actions/setup-node@v4
        with: {node-version: '20'}

      - name: Preparar Icone e App
        run: |
          # 1. Instalar ferramenta de conversão de imagem
          sudo apt-get update
          sudo apt-get install -y imagemagick
          
          npm install
          npm install @capacitor/assets
          
          mkdir -p www
          cp -r . www/ || true
          
          # 2. Converter o favicon para o formato do Android
          if [ -f "public/favicon.ico" ]; then
            convert "public/favicon.ico[0]" icon.png
          fi

          # 3. Configurar Capacitor
          rm -rf android capacitor.config.*
          echo '{"appId":"com.biblia.app","appName":"Biblia App","webDir":"www","server":{"androidScheme":"https"}}' > capacitor.config.json
          
          npx cap add android
          
          # 4. Gerar os ícones oficiais
          if [ -f "icon.png" ]; then
            npx @capacitor/assets generate --android --icon icon.png || true
          fi

      - name: Gerar APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: app-com-icone-v2
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
