name: Build APK Final
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node e Java
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Limpeza e Correção de Pastas
        run: |
          # 1. Remove qualquer rastro de pastas antigas que dão erro
          rm -rf devotional-dash
          
          # 2. Instala as dependências forçando a barra
          npm install --force
          
          # 3. Garante que o Capacitor saiba que os arquivos estão na raiz
          npx cap build android --packagemanager npm

      - name: Sincronização Nativa
        run: |
          # 4. Atualiza os plugins e copia o index.html e a foto
          npx cap update
          npx cap copy android

      - name: Gerar APK
        run: |
          # 5. Entra na pasta android real e compila
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-devocional-real
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
