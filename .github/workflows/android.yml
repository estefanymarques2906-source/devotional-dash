name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 21 e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Organizar e Sincronizar App
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 1. Cria a pasta limpa (sem o lixo do GitHub que engorda o app)
          mkdir -p public_html
          
          # 2. Copia apenas o que é arquivo do seu app (HTML, JS, CSS, Imagens)
          # Isso evita copiar a pasta 'android' para dentro dela mesma
          cp index.html public_html/ || true
          cp favicon.ico public_html/ || true
          cp *.png public_html/ || true
          cp -r assets public_html/ 2>/dev/null || true
          cp -r www public_html/ 2>/dev/null || true

          # 3. Configura o Capacitor apontando para a pasta correta
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "public_html",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 4. Atualiza o projeto Android
          npx cap add android || true
          npx cap sync android

          # 5. Ícone do App
          if [ -f "favicon.ico" ]; then
            cp favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: app-lumen-corrigido
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
