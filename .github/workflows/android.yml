name: Build Android APK

on:
  push:
    branches: [ main ] # Roda sempre que houver push na branch main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build do Web App
        run: npm run build # Certifique-se que este comando gera a pasta 'dist' ou 'www'

      - name: Configurar Capacitor
        run: |
          # Aqui corrigimos o erro: usamos um ID no formato com.exemplo.app
          npx cap init "Biblia App" com.biblia.app --web-dir dist
          npx cap add android

      - name: Sincronizar com Android
        run: npx cap sync android

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build do APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
