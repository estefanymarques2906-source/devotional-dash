name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 21 e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Juntar Tudo e Criar App
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 1. LIMPEZA TOTAL: Remove pastas que causam erro de conflito
          rm -rf android
          rm -rf Android
          rm -rf dist
          mkdir -p dist/client

          # 2. COPIA OS ARQUIVOS: Pega seu index.html e seu favicon.ico da raiz
          # O comando abaixo evita o erro de "copy into itself"
          cp index.html dist/client/ || true
          cp favicon.ico dist/client/ || true
          # Se você tiver outras pastas como 'public' ou 'src', copia elas também
          [ -d "public" ] && cp -r public/* dist/client/ || true
          [ -d "src" ] && cp -r src/* dist/client/ || true

          # 3. CONFIGURAÇÃO: Aponta o app para a pasta que acabamos de criar
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 4. GERA O ANDROID: Cria a plataforma do zero (limpa e sem erros)
          npx cap add android
          npx cap sync android

          # 5. ÍCONE: Transforma seu favicon.ico no ícone oficial do Android
          if [ -f "favicon.ico" ]; then
            cp favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-biblia-final
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
