name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preparar Pasta e Capacitor
        run: |
          # 1. Instala o Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 2. LIMPEZA TOTAL (Evita o erro de pasta existente)
          rm -rf android
          rm -rf dist
          mkdir -p dist/client

          # 3. COPIA OS ARQUIVOS (Ajustado para não dar erro de loop)
          cp index.html dist/client/ || true
          cp favicon.ico dist/client/ || true
          cp logo.png dist/client/ || true
          cp -r assets/* dist/client/ 2>/dev/null || true
          cp -r www/* dist/client/ 2>/dev/null || true

          # 4. CRIA O CONFIG (Exatamente como o Capacitor pede no erro)
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 5. GERA O PROJETO ANDROID
          npx cap add android
          npx cap sync android

          # 6. GERA O ÍCONE (favicon.ico -> icon.png)
          if [ -f "favicon.ico" ]; then
            cp favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-app-corrigido
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
