name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos
        uses: actions/checkout@v4

      - name: Configurar Ambiente
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Localizar e Juntar Tudo
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          
          # Limpeza
          rm -rf android dist
          mkdir -p dist/client

          # MOSTRAR NO LOG O QUE TEM NO GITHUB (Para a gente achar os 100MB)
          echo "Lista de arquivos no repositório:"
          ls -R

          # Copia o básico
          cp index.html dist/client/ || true
          cp favicon.ico dist/client/ || true
          cp logo.png dist/client/ || true

          # Tenta copiar TODAS as pastas que podem conter os 100MB
          # Adicionei várias opções comuns
          cp -r assets/* dist/client/ 2>/dev/null || true
          cp -r www/* dist/client/ 2>/dev/null || true
          cp -r public/* dist/client/ 2>/dev/null || true
          cp -r src/* dist/client/ 2>/dev/null || true
          cp -r content/* dist/client/ 2>/dev/null || true

          # Configura e Sincroniza
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          npx cap add android
          npx cap sync android

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-app-completo
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
