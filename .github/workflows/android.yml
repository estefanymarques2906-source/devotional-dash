name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      
      - name: Instalar Bun
        uses: oven-sh/setup-bun@v1

      - name: Construir e Organizar Pastas
        run: |
          # 1. Instala e gera o build do Vite (os 100MB)
          bun install
          bun run build

          # 2. RESOLVE O ERRO DE DIRETÓRIO: Garante que o index.html esteja onde o Capacitor quer
          # Se o build gerou em dist/, mas o Capacitor quer dist/client, nós unificamos
          mkdir -p dist/client
          if [ -f "dist/index.html" ]; then
            cp -r dist/* dist/client/ 2>/dev/null || true
          fi

          # 3. Instala as ferramentas do Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 4. LIMPEZA RADICAL: Apaga a pasta android velha pra não dar erro de plugin
          rm -rf android
          
          # 5. CONFIGURAÇÃO: Aponta exatamente para a pasta que o erro exigiu
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 6. SINCRONIZAÇÃO
          npx cap add android
          npx cap sync android

          # 7. ÍCONE: Pega o seu favicon da public e transforma em ícone de app
          if [ -f "public/favicon.ico" ]; then
            cp public/favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-apk-completo
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
