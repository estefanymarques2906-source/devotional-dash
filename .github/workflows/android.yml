name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 21 e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Juntar 100MB e Criar App
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 1. LIMPEZA TOTAL (Apaga a pasta Android que está travando o app)
          rm -rf android Android dist
          mkdir -p dist/client

          # 2. PUXA TUDO (Pega os arquivos de public, src e da raiz)
          # Isso garante que seus 100MB entrem no pacote
          cp -r public/* dist/client/ 2>/dev/null || true
          cp -r src/* dist/client/ 2>/dev/null || true
          cp index.html dist/client/ || true
          cp favicon.ico dist/client/ || true

          # 3. CONFIGURAÇÃO
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 4. GERA O PROJETO ANDROID NOVO
          npx cap add android
          npx cap sync android

          # 5. GERA O ÍCONE DO APP (Usando seu favicon.ico)
          if [ -f "favicon.ico" ]; then
            cp favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-biblia-100mb
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
