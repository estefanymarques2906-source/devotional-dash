name: Gerar Meu APK
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Criar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Subir Arquivo
        uses: actions/upload-artifact@v4
        with:
          name: meu-app-pronto
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
