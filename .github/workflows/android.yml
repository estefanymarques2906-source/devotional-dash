name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Juntar Tudo no App
        run: |
          # 1. Instala as ferramentas
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 2. Cria a pasta EXATA que o erro pediu (dist/client)
          rm -rf dist
          mkdir -p dist/client
          
          # 3. Copia TUDO do seu repositório para dentro dela
          # Isso garante que seus 100MB de imagens/vídeos entrem no app
          cp -rn ./* dist/client/ 2>/dev/null || true

          # 4. Cria a configuração batendo com a pasta criada
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 5. Prepara o Android (Limpando versões antigas)
          rm -rf android
          npx cap add android
          npx cap sync android

          # 6. Gera o ícone se o favicon existir
          if [ -f "favicon.ico" ]; then
            cp favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: app-lumen-total-100mb
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
