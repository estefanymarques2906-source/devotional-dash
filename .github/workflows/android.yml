name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Juntar Tudo no App
        run: |
          # 1. Instala as ferramentas necessárias
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 2. Cria uma pasta limpa para o App
          mkdir -p projeto_completo
          
          # 3. Move TUDO do seu GitHub para essa pasta (fotos, vídeos, tudo)
          # Usamos o 'find' para evitar copiar a pasta 'android' e o próprio script
          find . -maxdepth 1 -not -name 'projeto_completo' -not -name '.git' -not -name '.github' -not -name 'android' -not -name '.' -exec cp -rv {} projeto_completo/ \;

          # 4. Cria a configuração apontando para onde estão seus 100MB
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "projeto_completo",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 5. Prepara o Android do zero
          rm -rf android
          npx cap add android
          npx cap sync android

          # 6. Tenta gerar o ícone com o seu favicon
          if [ -f "favicon.ico" ]; then
            cp favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: app-lumen-completo
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
