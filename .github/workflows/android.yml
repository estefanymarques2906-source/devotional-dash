name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build do Web App
        run: npm run build --if-present

      - name: Organizar Arquivos e Configurar Capacitor
        run: |
          # 1. Cria uma pasta chamada www
          mkdir -p www
          
          # 2. Copia TUDO do seu git para dentro dessa pasta (menos a própria pasta www e a pasta android)
          # Isso garante que o index.html e tudo mais esteja onde o Capacitor gosta
          cp -rn . www/ 2>/dev/null || true
          
          # 3. Limpa configurações velhas
          rm -f capacitor.config.json capacitor.config.ts
          
          # 4. Inicializa apontando para a pasta www que acabamos de criar
          npx cap init BibliaApp com.biblia.app --web-dir www
          
          # 5. Adiciona a plataforma android
          npx cap add android || true

      - name: Sincronizar Projeto
        run: npx cap sync android

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build do APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
