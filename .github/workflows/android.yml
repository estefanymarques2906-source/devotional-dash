name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 21 e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preparar App e Icone
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          npm install
          npm install @capacitor/assets @capacitor/android

          # 1. Limpa e cria a pasta de distribuição
          rm -rf dist
          mkdir -p dist/client
          
          # 2. Copia seus arquivos web (ajuste se seus nomes de arquivo forem diferentes)
          # Aqui copiamos o que é essencial para o app não abrir em branco
          cp index.html dist/client/ || true
          cp -r assets dist/client/ || true
          cp *.css dist/client/ || true
          cp *.js dist/client/ || true

          # 3. Cria o config do Capacitor do zero para evitar erro de caminho
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia Devocional",
            "webDir": "dist/client",
            "server": {
              "androidScheme": "https"
            }
          }' > capacitor.config.json

          # 4. Sincroniza o projeto
          npx cap source @capacitor/android
          npx cap add android || true
          npx cap sync android

          # 5. Gera os ícones se o icon.png existir
          if [ -f "icon.png" ]; then
            npx @capacitor/assets generate --android
          fi

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-biblia-final
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
