name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Juntar Conteúdo e Ícone
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 1. Limpeza e criação da pasta do app
          rm -rf android dist
          mkdir -p dist/client

          # 2. Copia tudo de 'public' e 'src' para a pasta final
          # Como o ícone está na public, ele será copiado aqui
          cp -r public/* dist/client/ 2>/dev/null || true
          cp -r src/* dist/client/ 2>/dev/null || true
          
          # 3. Garante que o index.html e ícone estejam na raiz do build
          # (Caso não tenham sido copiados acima)
          cp public/favicon.ico dist/client/ 2>/dev/null || true
          cp public/index.html dist/client/ 2>/dev/null || true

          # 4. Configura o Capacitor
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 5. Gera o projeto Android
          npx cap add android
          npx cap sync android

          # 6. Gera o ícone oficial do Android usando o favicon.ico da public
          if [ -f "public/favicon.ico" ]; then
            cp public/favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          else
            echo "Aviso: favicon.ico não encontrado em public/"
          fi

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-app-final-corrigido
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
