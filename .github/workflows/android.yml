name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 21 e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Forçar Inclusão de Todos os Arquivos
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 1. Limpa tudo
          rm -rf android Android dist
          mkdir -p dist/client

          # 2. O COMANDO MÁGICO: Copia ABSOLUTAMENTE TUDO da raiz para o app
          # Ele ignora apenas as pastas de sistema para não dar erro.
          # Isso vai forçar os 100MB a entrarem no APK, não importa onde estejam.
          rsync -av . dist/client/ --exclude android --exclude Android --exclude .git --exclude .github --exclude node_modules

          # 3. Garante que o index.html e favicon.ico estejam na base
          cp index.html dist/client/ || true
          cp favicon.ico dist/client/ || true

          # 4. Configuração
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 5. Gera o Android
          npx cap add android
          npx cap sync android

          # 6. Gera o Ícone
          if [ -f "favicon.ico" ]; then
            cp favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-app-total
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
