name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Instalar Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Build do site
        run: npm run build

      # instala capacitor
      - name: Instalar Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      # REMOVE config antigo (resolve seu erro)
      - name: Remover config antigo
        run: rm -f capacitor.config.ts

      # inicia capacitor corretamente
      - name: Init Capacitor
        run: npx cap init com.biblia.app "Biblia App" --web-dir=dist

      - name: Add Android
        run: npx cap add android

      - name: Copiar arquivos
        run: npx cap copy

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Enviar APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
