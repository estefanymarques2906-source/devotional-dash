name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Juntar Conteúdo de Public e Src
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 1. Limpa tudo para começar do zero
          rm -rf android dist
          mkdir -p dist/client

          # 2. PUXA TUDO DAS SUAS PASTAS REAIS (Aqui estão os 100MB)
          # Copia o conteúdo de 'public' e 'src' para a pasta do app
          [ -d "public" ] && cp -r public/* dist/client/ || echo "Pasta public não encontrada"
          [ -d "src" ] && cp -r src/* dist/client/ || echo "Pasta src não encontrada"
          
          # Copia arquivos soltos na raiz (como index.html e favicon)
          cp index.html dist/client/ || true
          cp favicon.ico dist/client/ || true
          cp logo.png dist/client/ || true

          # 3. Configura o Capacitor apontando para a pasta que acabamos de encher
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 4. Gera o projeto Android
          npx cap add android
          npx cap sync android

          # 5. Gera o ícone usando o favicon.ico que está na raiz
          if [ -f "favicon.ico" ]; then
            cp favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-app-com-pastas
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
