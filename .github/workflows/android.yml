name: Build APK

on:
  push:
    branches: [main, principal]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "zulu"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci || npm install

      - name: Build do app web
        run: npm run build

      - name: Gerar index.html shell para Capacitor
        run: |
          # Descobrir o entry JS principal (maior arquivo index-*.js)
          ENTRY=$(ls -S dist/client/assets/index-*.js | head -1 | xargs basename)
          echo "Entry detectado: $ENTRY"

          cat > dist/client/index.html <<HTML
          <!doctype html>
          <html lang="pt-BR">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
              <title>Lumen — Bíblia Devocional</title>
              <link rel="icon" href="/favicon.ico" />
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="/assets/$ENTRY"></script>
            </body>
          </html>
          HTML

          echo "--- index.html gerado ---"
          cat dist/client/index.html

      - name: Sincronizar Capacitor com Android
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Construir APK debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
