name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar TUDO do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preparar App com Todos os Arquivos
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 1. Limpa rastros de builds antigos
          rm -rf android
          
          # 2. Cria o arquivo de configuração na RAIZ
          # Definimos o webDir como "." para ele pegar tudo o que existe no repositório
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": ".", 
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 3. Adiciona a plataforma e sincroniza TUDO o que está no Git
          npx cap add android
          
          # Removemos o que não deve ir para o APK para não engordar com lixo
          rm -rf node_modules
          
          npx cap sync android

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-app-total
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
