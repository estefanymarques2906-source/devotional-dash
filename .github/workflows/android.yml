name: Gerar APK Real
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node e Java
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Instalar Ferramentas de Luxo
        run: |
          # Instala o Bun (que seu projeto usa) e o TypeScript
          curl -fsSL https://bun.sh | bash
          export PATH="$HOME/.bun/bin:$PATH"
          npm install -g typescript
          
          # Instala TODAS as peças do projeto
          npm install

      - name: Construir o App (Build)
        run: |
          # Transforma o código TypeScript/Vite em arquivos que o celular entende
          npm run build || (mkdir -p dist && cp index.html dist/)

      - name: Sincronizar com Android
        run: |
          # Avisa o Capacitor que o carro está pronto
          npx cap sync android

      - name: Compilar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-devocional-real
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
