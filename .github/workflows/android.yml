name: Criar APK Completo
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar Código do Git
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Preparar e Sincronizar Arquivos
        run: |
          npm install
          # Cria a pasta www e limpa o que tiver lá
          mkdir -p www
          rm -rf www/*
          # Copia TUDO o que você tem no Git para a pasta do App
          cp -r . www/ || true
          # Remove a pasta android de dentro da www para não dar erro
          rm -rf www/android
          # Sincroniza com o projeto nativo
          npx cap sync android

      - name: Compilar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Disponibilizar Download
        uses: actions/upload-artifact@v4
        with:
          name: SeuAppInstalador
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
