name: Build APK

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 21 (Ajustado para o erro)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup App
        run: |
          npm install
          mkdir -p www
          cp -r . www/ || true
          rm -rf android capacitor.config.*
          npx cap init BibliaApp com.biblia.app --web-dir www
          npx cap add android

      - name: Sincronizar e Build
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: app-biblia
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
