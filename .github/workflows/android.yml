name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Construir Projeto Vite e APK
        run: |
          # 1. Instala as dependências do seu projeto
          npm install
          
          # 2. Comando que transforma seus 100MB de código em arquivos reais
          npm run build

          # 3. Instala o Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 4. Limpa e configura (Vite gera tudo na pasta 'dist')
          rm -rf android
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 5. Sincroniza o que foi construído no passo 2
          npx cap add android
          npx cap sync android

          # 6. Gera o ícone se o favicon.ico estiver na 'public'
          if [ -f "public/favicon.ico" ]; then
            cp public/favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-app-vitedist
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
