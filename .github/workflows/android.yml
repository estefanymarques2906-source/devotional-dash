name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java (JDK 17) - NECESSÁRIO PARA ANDROID ATUAL
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build do Web App
        run: npm run build --if-present

      - name: Preparar Pastas e Capacitor
        run: |
          mkdir -p www
          cp -rn . www/ 2>/dev/null || true
          rm -f capacitor.config.json capacitor.config.ts
          npx cap init BibliaApp com.biblia.app --web-dir www
          npx cap add android || true

      - name: Sincronizar Projeto
        run: npx cap sync android

      - name: Corrigir Versão do Java no Gradle
        run: |
          cd android
          echo "org.gradle.java.home=${JAVA_HOME_17_X64}" >> gradle.properties
          chmod +x gradlew

      - name: Criar APK (Gradle)
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
