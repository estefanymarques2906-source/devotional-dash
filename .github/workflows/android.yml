name: Build APK

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup App
        run: |
          npm install
          mkdir -p www
          cp -r . www/ || true
          rm -rf android capacitor.config.*
          npx cap init BibliaApp com.biblia.app --web-dir www
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          echo "org.gradle.java.home=${JAVA_HOME}" >> gradle.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-final
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
