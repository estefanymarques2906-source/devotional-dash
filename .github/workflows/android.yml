name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      
      - name: Instalar Bun
        uses: oven-sh/setup-bun@v1

      - name: Construir Projeto Real
        run: |
          # 1. Instala e gera os arquivos (os 100MB)
          bun install
          bun run build

          # 2. RESOLVENDO O ERRO DO LOG: Cria a pasta exata que ele pede
          # e move o index.html e tudo o mais para dentro dela
          mkdir -p dist/client
          cp -r dist/* dist/client/ 2>/dev/null || true

          # 3. Instala o Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 4. LIMPEZA TOTAL para evitar erro de plugin
          rm -rf android
          
          # 5. CONFIGURAÇÃO: Forçando o webDir para a pasta que o log exige
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 6. SINCRONIZAÇÃO
          npx cap add android
          npx cap sync android

          # 7. ÍCONE: Usa o favicon.ico da public como ícone do app
          if [ -f "public/favicon.ico" ]; then
            cp public/favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-app-completo
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
