name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build do Web App
        run: npm run build --if-present

      - name: Configurar Capacitor (Sem espaços e na Raiz)
        run: |
          # Limpeza total para evitar erros de "arquivo já existe" ou "ID inválido"
          rm -f capacitor.config.json
          rm -f capacitor.config.ts
          
          # Nome: BibliaApp (sem espaço) | ID: com.biblia.app | Pasta: ./ (raiz)
          npx cap init BibliaApp com.biblia.app --web-dir ./
          
          # Adiciona a plataforma android (o || true evita erro se a pasta já existir)
          npx cap add android || true

      - name: Sincronizar Projeto
        run: npx cap sync android

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build do APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
