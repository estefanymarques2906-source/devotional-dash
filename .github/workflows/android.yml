name: Gerar APK Real
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node e Java
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Limpeza e Preparação
        run: |
          # Remove arquivos que podem causar conflito no celular
          rm -rf devotional-dash
          mkdir -p dist
          # Garante que seus arquivos principais vão para a pasta de build
          cp index.html dist/index.html
          cp icon.png dist/icon.png || echo "Aviso: icon.png não encontrado, mas continuando..."

      - name: Instalação Completa (Sem Erros)
        run: |
          npm install -g typescript
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # O comando abaixo ignora erros de configuração prévia
          npx cap add android || true
          
      - name: Sincronização Forçada
        run: |
          # Força o Capacitor a ler o seu index.html novo
          npx cap copy android

      - name: Gerar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-devocional-real
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
