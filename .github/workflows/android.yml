name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Juntar Arquivos e Configurar Icone
        run: |
          npm install
          # Cria a pasta que o Android lê
          mkdir -p www
          cp -r . www/ || true
          
          # Tenta gerar ícones se você tiver uma imagem icon.png ou logo.png
          npx capacitor-assets generate --android || true

          # Limpeza de segurança
          rm -rf android capacitor.config.*
          
          # Inicializa o App permitindo ler arquivos locais (ajuda a abrir)
          npx cap init BibliaApp com.biblia.app --web-dir www
          
          # Cria a pasta Android do zero
          npx cap add android

      - name: Ajustar Permissões para o App Abrir
        run: |
          # Esse comando permite que o app leia arquivos internos sem dar tela branca
          sed -i 's/allowMixedContent: false/allowMixedContent: true/g' android/app/src/main/res/xml/network_security_config.xml || true

      - name: Gerar APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Baixar o APK
        uses: actions/upload-artifact@v4
        with:
          name: app-biblia-pronto
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
