name: Build APK Final com Icone

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 21 e Node
        uses: actions/setup-java@v4
        with: {java-version: '21', distribution: 'zulu'}
      - uses: actions/setup-node@v4
        with: {node-version: '20'}

      - name: Preparar App e Converter Icone
        run: |
          npm install
          # Instala ferramenta para gerar ícones
          npm install @capacitor/assets imagemagick
          
          # Junta todos os seus arquivos
          mkdir -p www
          cp -r . www/ || true
          
          # CONVERTE O SEU FAVICON.ICO PARA PNG (Para o Android aceitar)
          if [ -f "public/favicon.ico" ]; then
            convert "public/favicon.ico[0]" icon.png
          fi

          # Reseta e configura o Capacitor
          rm -rf android capacitor.config.*
          # O server.androidScheme ajuda o app a abrir sem falhas
          echo '{"appId":"com.biblia.app","appName":"Biblia App","webDir":"www","server":{"androidScheme":"https"}}' > capacitor.config.json
          
          npx cap add android
          
          # Gera os ícones do Android usando o arquivo convertido
          if [ -f "icon.png" ]; then
            npx @capacitor/assets generate --android --icon icon.png || true
          fi

      - name: Gerar APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK Pronto
        uses: actions/upload-artifact@v4
        with:
          name: app-com-icone
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
