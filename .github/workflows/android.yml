name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 21 e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preparar App e Icone
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 1. Limpa e cria a pasta de distribuição
          rm -rf dist
          mkdir -p dist/client
          
          # 2. Copia seus arquivos para a pasta do app
          cp index.html dist/client/ || true
          cp favicon.ico dist/client/ || true
          [ -d "assets" ] && cp -r assets dist/client/ || echo "Pasta assets não encontrada"
          cp *.css dist/client/ || true
          cp *.js dist/client/ || true

          # 3. Configuração do Capacitor
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia Devocional",
            "webDir": "dist/client",
            "server": {
              "androidScheme": "https"
            }
          }' > capacitor.config.json

          # 4. Comandos de sincronização (Corrigido)
          npx cap add android || true
          npx cap sync android

          # 5. Gerar ícones usando o favicon.ico
          # Se o arquivo favicon.ico existir, ele será usado como base para o app
          if [ -f "favicon.ico" ]; then
            echo "Gerando ícones a partir do favicon.ico..."
            # O Capacitor Assets geralmente busca por icon.png, então criamos uma cópia temporária
            cp favicon.ico icon.png
            npx @capacitor/assets generate --android
          else
            echo "ERRO: O arquivo favicon.ico não foi encontrado na raiz do GitHub."
          fi

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-biblia-final
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
