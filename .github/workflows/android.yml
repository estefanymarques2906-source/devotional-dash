name: Gerar APK Real
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node e Java
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Instalar Bun e Dependencias
        uses: oven-sh/setup-bun@v1
      - run: |
          bun install
          bun install -D vite @vitejs/plugin-react typescript

      - name: Build do Código (O segredo)
        run: |
          bun run build || (mkdir -p dist && cp src/index.html dist/index.html || echo '<html><body>Verifique seu arquivo principal</body></html>' > dist/index.html)

      - name: Sincronizar Capacitor
        run: |
          bun x cap add android || true
          bun x cap copy android

      - name: Gerar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-devocional-real
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
