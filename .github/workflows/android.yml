name: Build Android APK

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preparar Tudo (Copia arquivos do Git)
        run: |
          npm install
          mkdir -p www_final
          # Copia seus arquivos para a pasta do app
          cp -r . www_final/ || true
          # Limpa lixo
          rm -rf www_final/android www_final/node_modules www_final/.github
          rm -rf android capacitor.config.*
          # Configura o Capacitor
          npx cap init BibliaApp com.biblia.app --web-dir www_final
          npx cap add android

      - name: Sincronizar e Criar APK
        run: |
          npx cap sync android
          cd android
          echo "org.gradle.java.home=${JAVA_HOME}" >> gradle.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Me entregar o APK pronto
        uses: actions/upload-artifact@v4
        with:
          name: aplicativo-biblia
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
