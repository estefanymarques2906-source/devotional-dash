name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      
      - name: Instalar Bun
        uses: oven-sh/setup-bun@v1

      - name: Forçar Criação do Dist e Build
        run: |
          # 1. Instala tudo
          bun install

          # 2. Tenta fazer o build do Vite
          bun run build || echo "Build falhou, tentando recuperar..."

          # 3. CRIAÇÃO DA MERDA DO DIST NA MARRA
          # Procura onde o Vite jogou o index.html e move tudo para dist/client
          mkdir -p dist/client
          
          # Procura o index.html gerado (excluindo pastas de sistema)
          SEARCH_PATH=$(find . -name "index.html" -not -path "*/node_modules/*" -not -path "*/android/*" -not -path "./index.html" | head -n 1)
          
          if [ ! -z "$SEARCH_PATH" ]; then
            echo "Arquivos encontrados em: $(dirname $SEARCH_PATH)"
            cp -r $(dirname $SEARCH_PATH)/* dist/client/
          else
            echo "Aviso: index.html não gerado pelo build, usando o da raiz como backup"
            cp index.html dist/client/ || echo "<html><body>App Lumen</body></html>" > dist/client/index.html
          fi

          # 4. Instala Capacitor e Limpa Android antigo
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          rm -rf android

          # 5. CONFIGURAÇÃO FORÇADA
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 6. SINCRONIZAÇÃO (Agora com a pasta garantida)
          npx cap add android
          npx cap sync android

          # 7. ÍCONE
          if [ -f "public/favicon.ico" ]; then
            cp public/favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-apk-resolvido
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
