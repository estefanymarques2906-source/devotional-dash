name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      
      - name: Instalar Bun
        uses: oven-sh/setup-bun@v1

      - name: Construir Projeto com Bun
        run: |
          # 1. Instala tudo usando o Bun (que é o que você usa)
          bun install

          # 2. Gera os arquivos reais do app (os 100MB)
          bun run build

          # 3. Instala o Capacitor para gerar o APK
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 4. Configura o Capacitor para ler a pasta 'dist' que o Bun criou
          rm -rf android
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 5. Sincroniza os arquivos
          npx cap add android
          npx cap sync android

          # 6. Gera o ícone a partir da public
          if [ -f "public/favicon.ico" ]; then
            cp public/favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-app-bun-total
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
