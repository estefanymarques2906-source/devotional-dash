name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do meu GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Juntar TUDO do Git para o APK
        run: |
          # 1. Cria a pasta que o Capacitor exige
          mkdir -p www
          # 2. COPIA TODOS OS SEUS ARQUIVOS do GitHub para dentro da pasta do App
          cp -r . www/ 2>/dev/null || true
          # 3. Remove configurações velhas que estão dando erro
          rm -f capacitor.config.json capacitor.config.ts
          # 4. Configura o App com os SEUS arquivos
          npx cap init BibliaApp com.biblia.app --web-dir www
          # 5. Cria a pasta android nova com os SEUS arquivos dentro
          rm -rf android
          npx cap add android

      - name: Sincronizar arquivos
        run: npx cap sync android

      - name: Gerar o APK agora
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Me entregar o APK pronto
        uses: actions/upload-artifact@v4
        with:
          name: meu-aplicativo-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
