name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      
      - name: Instalar Bun
        uses: oven-sh/setup-bun@v1

      - name: Construir Projeto
        run: |
          # 1. Instala e constrói o projeto (gera os 100MB)
          bun install
          bun run build

          # 2. Verifica onde o Vite criou os arquivos e garante a pasta certa
          # Se o Vite criou 'dist', nós garantimos que 'dist/client' exista para o Capacitor não chorar
          if [ -d "dist" ] && [ ! -d "dist/client" ]; then
            mkdir -p dist/client
            cp -r dist/* dist/client/ 2>/dev/null || true
          fi

          # 3. Instala o Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 4. Configura o Capacitor exatamente onde os arquivos estão
          rm -rf android
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 5. Sincroniza
          npx cap add android
          npx cap sync android

          # 6. Gera o ícone do App usando seu favicon.ico
          # O log mostrou que o favicon está em public/
          if [ -f "public/favicon.ico" ]; then
            cp public/favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-app-total-corrigido
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
