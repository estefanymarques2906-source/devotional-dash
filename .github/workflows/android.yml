name: Criar APK Final
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Instalar e Preparar Pastas
        run: |
          npm install
          npm run build --if-present
          mkdir -p www
          # Garante que o Android encontre um arquivo inicial
          if [ ! -f www/index.html ]; then
            cp index.html www/ 2>/dev/null || echo "<html><body>App rodando</body></html>" > www/index.html
          fi
          npx cap sync android

      - name: Construir APK com Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Entregar o APK Pronto
        uses: actions/upload-artifact@v4
        with:
          name: meu-aplicativo-instalador
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
