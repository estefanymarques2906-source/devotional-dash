name: Build Android APK

on:
  push:
    branches: [ main, principal ] # Roda nas duas possíveis branches

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Limpeza e Preparação
        run: |
          npm install
          # Cria pasta limpa e copia só o que importa (seu index, css, js)
          mkdir -p pasta_final
          rsync -av . pasta_final/ --exclude android --exclude node_modules --exclude .github --exclude .git
          
          # Reseta tudo para não ter erro de "já existe"
          rm -rf android capacitor.config.json capacitor.config.ts
          
          # Inicializa o Capacitor apontando para a pasta com seus arquivos
          npx cap init BibliaApp com.biblia.app --web-dir pasta_final
          npx cap add android

      - name: Sincronizar Projeto
        run: |
          npx cap sync android
          cd android
          echo "org.gradle.java.home=${JAVA_HOME}" >> gradle.properties
          chmod +x gradlew

      - name: Criar APK Final
        run: |
          cd android
          # O 'clean' garante que comece do zero sem erros antigos
          ./gradlew clean assembleDebug --no-daemon

      - name: Me entregar o APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-aplicativo
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
