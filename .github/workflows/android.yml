name: Build APK

on:
  push:
    branches: [main, principal]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "zulu"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci || npm install

      - name: Build do app web
        run: npm run build

      - name: Gerar index.html do Capacitor com bootstrap real
        run: |
          CLIENT_ENTRY=$(node -e "const fs=require('fs'); const dir='dist/client/assets'; const files=fs.readdirSync(dir).filter(f => /^index-.*\.js$/.test(f)); const chosen=files.find(f => fs.readFileSync(dir + '/' + f, 'utf8').includes('document.getElementById')) || files[0]; if (!chosen) process.exit(1); process.stdout.write(chosen)")
          CLIENT_CSS=$(node -e "const fs=require('fs'); const dir='dist/client/assets'; const files=fs.readdirSync(dir).filter(f => /^styles-.*\.css$/.test(f)); if (files[0]) process.stdout.write(files[0])")

          echo "Bootstrap JS: $CLIENT_ENTRY"
          echo "CSS principal: $CLIENT_CSS"

          cat > dist/client/index.html <<HTML
          <!doctype html>
          <html lang="pt-BR">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
              <title>Lumen — Bíblia Devocional</title>
              <link rel="icon" href="./favicon.ico" />
              <meta name="theme-color" content="#1a1d2e" />
              ${CLIENT_CSS:+<link rel="stylesheet" href="./assets/$CLIENT_CSS" />}
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="./assets/$CLIENT_ENTRY"></script>
            </body>
          </html>
          HTML

          echo "--- index.html gerado ---"
          cat dist/client/index.html

      - name: Sincronizar Capacitor com Android
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Construir APK debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
