name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Montar App Sem Erro
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 1. Limpa tudo e cria a pasta fora da raiz de busca
          rm -rf android dist
          mkdir -p ../temp_build
          
          # 2. Copia TUDO do GitHub para a pasta temporária externa (evita o loop)
          # Isso garante que seus 100MB de arquivos entrem no app
          cp -R . ../temp_build/

          # 3. Move de volta para a pasta que o Capacitor vai ler
          mkdir -p dist/client
          cp -R ../temp_build/* dist/client/

          # 4. Configura o Capacitor apontando para a pasta com os 100MB
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 5. Gera o Android do zero
          npx cap add android
          npx cap sync android

          # 6. Tenta gerar o ícone a partir do favicon (onde quer que ele esteja)
          FAVICON=$(find dist/client -name "favicon.ico" | head -n 1)
          if [ ! -z "$FAVICON" ]; then
            cp "$FAVICON" icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: app-lumen-final-mesmo
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
