name: Gerar APK Real
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Preparar Arquivos
        run: |
          # Isso limpa a bagunça e foca no seu index e na sua foto
          mkdir -p android/app/src/main/assets/public
          cp index.html android/app/src/main/assets/public/index.html
          cp icon.png android/app/src/main/assets/public/icon.png || true

      - name: Compilar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-devocional-real
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
