name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar tudo do GitHub
        uses: actions/checkout@v4

      - name: Configurar Java 21 e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Juntar Tudo e Preparar App
        run: |
          # Instala as ferramentas do Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 1. Cria a pasta de destino
          mkdir -p dist/client
          
          # 2. COPIA TUDO (O segredo para voltar aos 100MB)
          # Isso joga todos os seus arquivos, imagens e subpastas para o build
          cp -R ./* dist/client/ 2>/dev/null || true

          # 3. Garante que o arquivo de ícone tenha o nome que o gerador entende
          if [ -f "favicon.ico" ]; then
            cp favicon.ico icon.png
          fi

          # 4. Cria a configuração apontando para a pasta com TODOS os arquivos
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia Devocional",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 5. Adiciona a plataforma Android e sincroniza os 100MB de arquivos
          npx cap add android || true
          npx cap sync android

          # 6. Gera os ícones do App
          if [ -f "icon.png" ]; then
            npx @capacitor/assets generate --android || echo "Pulando geração de ícones"
          fi

      - name: Gerar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-biblia-final
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
