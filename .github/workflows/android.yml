name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      
      - name: Instalar Bun
        uses: oven-sh/setup-bun@v1

      - name: Construir e Forçar Pastas
        run: |
          # 1. Instala e gera o build (os 100MB)
          bun install
          bun run build

          # 2. SE O VITE GEROU 'dist', NÓS CRIAMOS 'dist/client' NA MARRA
          # E movemos tudo para dentro para o Capacitor não reclamar
          if [ -d "dist" ]; then
            mkdir -p dist/client
            cp -r dist/* dist/client/ 2>/dev/null || true
          else
            # Se nem a dist existir, o build falhou antes
            mkdir -p dist/client
            echo "<html><body>Erro no Build do Vite</body></html>" > dist/client/index.html
          fi

          # 3. Instala o Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 4. LIMPEZA TOTAL DA PASTA ANDROID (Mata o erro do capacitor.plugins.json)
          rm -rf android
          
          # 5. CONFIGURAÇÃO
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 6. SINCRONIZAÇÃO
          npx cap add android
          npx cap sync android

          # 7. ÍCONE (Usa seu favicon da public)
          if [ -f "public/favicon.ico" ]; then
            cp public/favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-app-total
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
