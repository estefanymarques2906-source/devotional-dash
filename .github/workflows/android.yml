name: Build APK Final

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar arquivos
        uses: actions/checkout@v4

      - name: Configurar Java e Node
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Construir App Limpo
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          # 1. Cria a pasta de build e limpa qualquer erro anterior
          rm -rf android dist
          mkdir -p dist/client

          # 2. Copia seus 100MB de arquivos (fotos e códigos)
          # Ele busca em public, src ou na raiz
          cp index.html dist/client/ || true
          cp favicon.ico dist/client/ || true
          cp -r public/* dist/client/ 2>/dev/null || true
          cp -r src/* dist/client/ 2>/dev/null || true

          # 3. Configuração do App
          echo '{
            "appId": "com.lumen.biblia",
            "appName": "Lumen Biblia",
            "webDir": "dist/client",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # 4. Gera a pasta android NOVA (isso evita o erro de fechar o app)
          npx cap add android
          npx cap sync android

          # 5. Gera o ícone do app
          if [ -f "dist/client/favicon.ico" ]; then
            cp dist/client/favicon.ico icon.png
            npx @capacitor/assets generate --android || true
          fi

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: lumen-app-final
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
