name: Build Project

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      # 🔥 SÓ BUILD (SEM CAPACITOR)
      - run: npm run build

      # 🔍 VER SE CRIOU DIST
      - run: ls -la

      # 📦 SALVAR DIST
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
